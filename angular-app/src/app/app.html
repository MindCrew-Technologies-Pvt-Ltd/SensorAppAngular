<div class="dashboard">
  <app-dashboard-header
    [isStreaming]="data.isStreaming()"
    (toggleStreaming)="toggleStreaming()"
    (clearData)="clearData()"
  />

  <!-- Chart Row -->
  <div class="chart-row">
    <app-chart-widget
      title="Live Time-Series Chart (Last 300 Points)"
      [data]="data.chartData()"
    />
  </div>

  <!-- Metrics Row -->
  <div class="metrics-row">
    <app-metrics-panel
      [metrics]="data.keyMetrics()"
    />
  </div>

  <!-- Anomalies and Status Row -->
  <div class="anomalies-status-row">
    <div class="anomalies-section">
      <app-anomaly-history
        [anomalies]="data.recentAnomalies()"
      />
    </div>
    
    <div class="status-section">
      <app-system-status
        [statusItems]="data.systemStatusItems()"
      />
    </div>
  </div>
</div>
